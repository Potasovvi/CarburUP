name: Scrape giornaliero

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
        working-directory: backend
      - run: npm run scrape
        working-directory: backend
      - run: npm run scrape:prezzo
        working-directory: backend
      - run: npm run sync
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
